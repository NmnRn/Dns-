services:
  dns-python:
    build: .
    container_name: dns-python
    restart: unless-stopped
    environment:
      - BIND_ADDRESS=0.0.0.0
      - CONTAINER_UDP_PORT=${CONTAINER_UDP_PORT:-5300}
      - CONTAINER_HTTPS_PORT=${CONTAINER_HTTPS_PORT:-44300}
      - CONTAINER_QUIC_PORT=${CONTAINER_QUIC_PORT:-85300}
    networks:
      dns-net:
        ipv4_address: 172.27.17.2

networks:
  dns-net:
    external: true
