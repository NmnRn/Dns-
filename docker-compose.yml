services:
  dns-python:
    build: .
    container_name: dns-python
    restart: unless-stopped
    environment:
      - BIND_ADDRESS=0.0.0.0
      - CONTAINER_UDP_PORT=${CONTAINER_UDP_PORT:-5300}
      - CONTAINER_HTTPS_PORT=${CONTAINER_HTTPS_PORT:-44300}
      - CONTAINER_DOQ_PORT=${CONTAINER_DOQ_PORT:-8530}
      - ALLOWED_HOST=${ALLOWED_HOST:-dns.example.com}
      - ENABLE_UDP_SERVER=${ENABLE_UDP_SERVER:-true}
      - ENABLE_HTTPS_SERVER=${ENABLE_HTTPS_SERVER:-false}
      - ENABLE_DOT_SERVER=${ENABLE_DOT_SERVER:-false}
      - ENABLE_DOQ_SERVER=${ENABLE_DOQ_SERVER:-false}
      - CONTAINER_DOT_PORT=${CONTAINER_DOT_PORT:-8853}
      - CERT_FILE=${CERT_FILE:-/app/certificates/fullchain.pem}
      - KEY_FILE=${KEY_FILE:-/app/certificates/privkey.pem}
      # DB ayarları host'taki .env'den okunur (install.sh yazar); imajın
      # içindeki .env bilerek boştur (.dockerignore) - değerler buradan geçer.
      - DB_HOST=${DB_HOST:-172.27.17.1}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-dns_user}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - DB_NAME=${DB_NAME:-dns_db}
    # Varsayılan: host'a hiç port açılmıyor, container sadece dns-net üzerinden
    # diğer container'lara (AdGuard, Cloudflare Tunnel) erişilebilir. Dışarıya
    # (host'un public IP'sine) port açmak için: ./setup.sh çalıştırıp ilgili
    # soruya "e" de — script docker-compose.override.yml üretir. O dosya .env'e
    # göre portları publish eder, git ile izlenmez ve güncellemelerden etkilenmez.
    networks:
      dns-net:
        ipv4_address: 172.27.17.2

networks:
  dns-net:
    external: true
